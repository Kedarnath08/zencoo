# Test config: boots the whole app against an in-memory H2 database so tests
# (and CI) don't need a running MySQL.
spring.datasource.url=jdbc:h2:mem:zencoo;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

jwt.secret=test-secret-key-please-change-0123456789abcdef0123456789abcdef0123456789
jwt.expiration-ms=86400000
cors.allowed-origins=*

# Effectively disable the auth rate limit during tests (many register/login calls share one IP).
auth.rate-limit.max-requests=100000
auth.rate-limit.window-seconds=60
