spring.application.name=backend

# Database (override with env vars in production)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/zencoo_userdb?useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# Fail fast on lazy access outside a transaction rather than silently opening a session per request.
spring.jpa.open-in-view=false

server.port=8080
server.address=0.0.0.0

# JWT config. In production, set JWT_SECRET as an environment variable (>= 64 bytes for HS512).
# The default below is for local development only.
jwt.secret=${JWT_SECRET:b8d7f6e5c4a3b2d1e0f9a8b7c6d5e4f3b2a1c0d9e8f7b6a5c4d3e2f1b0a9c8d7e6f5a4b3c2d1e0f9a8b7c6d5e4f3}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS allowed origins (comma-separated). Default "*" for development.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Simple per-IP rate limit for auth endpoints (fixed window). In-memory / single-instance.
auth.rate-limit.max-requests=${AUTH_RATE_LIMIT_MAX:10}
auth.rate-limit.window-seconds=${AUTH_RATE_LIMIT_WINDOW:60}

# Google Sign-In: comma-separated list of accepted OAuth client IDs (web/iOS/Android),
# from Google Cloud Console. A token is accepted if it was issued for any of these.
google.oauth.client-ids=${GOOGLE_OAUTH_CLIENT_IDS:}
